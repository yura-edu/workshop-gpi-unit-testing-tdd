# yura.workshop.yaml — declarative grader config
# Spec: docs/grader-workers-spec.md §6
# Generated from prisma/seeds/workshop-templates.seed.ts

schema_version: "1.0"
workshop:
  id: gpi-unit-testing-tdd
  title: "Unit Testing con TDD"
  type: testing
  language: typescript
  passing_threshold: 70
  base_branch: main
submission:
  source: workshop_link
  required_inputs:
    - type: github_repo_url
      label: "URL del repositorio"
      required: true
    - type: github_pr_url
      label: "URL del Pull Request"
      required: true
evaluation_profile:
  - metric_id: test_coverage
    weight: 35
    threshold: 0.85
    config:
      runner: vitest
      coverage_tool: c8
      coverage_format: lcov
      report_path: coverage/lcov.info
      include_paths:
        - src/
      exclude_paths:
        - tests/
        - "**/__init__.py"
        - "**/*.spec.ts"
        - "**/*.test.ts"
      min_coverage_percent: 85
      min_coverage_per_file: 0
      timeout_seconds: 300
      extra_args: []
  - metric_id: test_pass_rate
    weight: 25
    threshold: 1
    config:
      runner: vitest
      report_format: vitest_json
      report_path: reports/test-results.json
      min_pass_rate_percent: 100
      timeout_seconds: 300
  - metric_id: cyclomatic_complexity
    weight: 15
    threshold: 8
    config:
      tool: eslint-complexity
      max_per_function: 8
      aggregation: avg
      include_paths:
        - src/
      exclude_paths:
        - tests/
        - "**/__init__.py"
        - "**/*.test.ts"
        - "**/*.spec.ts"
      timeout_seconds: 120
  - metric_id: commit_message_quality
    weight: 15
    threshold: 0.7
    config:
      pattern: "^(feat|fix|chore|docs|refactor|test|style|perf|ci|build)(\\(.+\\))?: .{10,}$"
      min_message_length: 10
      range: pr_only
      max_violations_allowed: 0
  - metric_id: lint_violations
    weight: 10
    threshold: 0
    config:
      tool: eslint
      severity_levels:
        - error
        - warning
      fail_on: error
      max_violations: 0
